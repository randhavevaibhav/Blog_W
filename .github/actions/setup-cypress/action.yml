name: "Setup Cypress Environment"
description: "Reusable setup steps for Cypress tests with Vite app"

runs:
  using: "composite"
  steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Build Vite app
      run: npm run build
      shell: bash

    - name: Preview Vite app
      run: npm run preview &
      shell: bash
